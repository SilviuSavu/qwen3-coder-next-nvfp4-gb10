# Recipe: Qwen3-Coder-Next-NVFP4-GB10
# saricles GB10-tuned NVFP4 quantization — Marlin backend for 512 experts

recipe_version: "1"
name: Qwen3-Coder-Next-NVFP4-GB10
description: vLLM serving Qwen3-Coder-Next with NVFP4 quantization (GB10-tuned, Marlin backend)

# HuggingFace model to download (optional, for --download-model)
model: saricles/Qwen3-Coder-Next-NVFP4-GB10

# Container image to use (built from Dockerfile.nvfp4)
container: vllm-node-nvfp4

# Patches: Triton int64 strides (perf), Triton allocator, gate quant fix
mods:
  - mods/fix-qwen3-coder-next

# Default settings (can be overridden via CLI)
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.85
  max_model_len: 200000

# Environment variables (per model card)
env:
  VLLM_NVFP4_GEMM_BACKEND: "marlin"
  VLLM_TEST_FORCE_FP8_MARLIN: "1"
  VLLM_USE_FLASHINFER_MOE_FP4: "0"
  VLLM_MARLIN_USE_ATOMIC_ADD: "1"

# The vLLM serve command template
command: |
  vllm serve saricles/Qwen3-Coder-Next-NVFP4-GB10 \
    --enable-auto-tool-choice \
    --tool-call-parser qwen3_coder \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --host {host} \
    --port {port} \
    --load-format fastsafetensors \
    --dtype bfloat16 \
    --attention-backend flashinfer \
    --enable-prefix-caching \
    --max-model-len {max_model_len} \
    --max-num-batched-tokens 16384 \
    -tp {tensor_parallel}
